<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talha Humayun | Creative Designer</title>
  <style>
    :root {
      --primary: #f39c12;
      --secondary: #e74c3c;
      --bg: #121212;
      --text: #ffffff;
      --text-muted: #a0a0a0;
      --card-bg: #1e1e1e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Particle canvas ── */
    #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ── Ambient glow blobs ── */
    .glow-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    .glow-blob.a { width: 500px; height: 500px; background: var(--primary); top: -120px; left: -100px; animation: driftA 14s ease-in-out infinite alternate; }
    .glow-blob.b { width: 420px; height: 420px; background: var(--secondary); bottom: -100px; right: -80px;  animation: driftB 18s ease-in-out infinite alternate; }
    @keyframes driftA { from { transform: translate(0,0); } to { transform: translate(60px, 40px); } }
    @keyframes driftB { from { transform: translate(0,0); } to { transform: translate(-50px, -30px); } }

    /* ── Gate card ── */
    .gate-wrap {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .gate-card {
      background: rgba(30,30,30,0.72);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 24px;
      padding: 3rem 2.8rem 2.6rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(243,156,18,0.08);
      animation: cardIn 0.7s cubic-bezier(0.34,1.36,0.64,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    /* Logo / name */
    .gate-logo {
      text-align: center;
      margin-bottom: 0.4rem;
      font-size: 1.55rem;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .gate-logo span {
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .gate-sub {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.82rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 2.4rem;
    }

    /* Divider line */
    .gate-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(243,156,18,0.4), transparent);
      margin-bottom: 2.2rem;
    }

    /* Label */
    .gate-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
    }

    /* Input */
    .gate-input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
      margin-bottom: 1.6rem;
    }
    .gate-input:focus {
      border-color: var(--primary);
      background: rgba(243,156,18,0.05);
      box-shadow: 0 0 0 3px rgba(243,156,18,0.12);
    }
    .gate-input.error {
      border-color: var(--secondary);
      box-shadow: 0 0 0 3px rgba(231,76,60,0.15);
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }
    .gate-input::placeholder { color: #555; }

    /* Error message */
    .gate-error {
      display: none;
      color: var(--secondary);
      font-size: 0.8rem;
      font-weight: 600;
      margin-top: -1.1rem;
      margin-bottom: 1.2rem;
      padding-left: 4px;
    }
    .gate-error.show { display: block; }

    /* Button */
    .gate-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s, opacity 0.25s;
      position: relative;
      overflow: hidden;
    }
    .gate-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(243,156,18,0.35);
    }
    .gate-btn:active:not(:disabled) { transform: translateY(0); }
    .gate-btn:disabled { opacity: 0.7; cursor: not-allowed; }

    /* Spinner inside button */
    .btn-spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
    }
    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
    .gate-btn.loading .btn-spinner { display: block; }

    /* Footer note */
    .gate-footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #3a3a3a;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="glow-blob a"></div>
<div class="glow-blob b"></div>

<div class="gate-wrap">
  <div class="gate-card">

    <div class="gate-logo">Talha <span>Humayun</span></div>
    <div class="gate-sub">Creative Designer</div>
    <div class="gate-divider"></div>

    <label class="gate-label" for="visitor-name">Your Name</label>
    <input
      class="gate-input"
      id="visitor-name"
      type="text"
      placeholder="Enter your name to continue..."
      autocomplete="off"
      spellcheck="false"
      maxlength="80"
    />
    <div class="gate-error" id="name-error">Please enter your name to continue.</div>

    <button class="gate-btn" id="enter-btn" onclick="handleEnter()">
      Open Portfolio
      <div class="btn-spinner"></div>
    </button>

    <div class="gate-footer">Portfolio by Talha Humayun &nbsp;·&nbsp; 2024</div>
  </div>
</div>

<!-- EmailJS (loaded silently) -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  /* ── EmailJS init ── */
  emailjs.init('1WnG5ED7oOvA1hb1w');

  /* ── Enter on keydown ── */
  document.getElementById('visitor-name').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleEnter();
  });

  /* ── Clear error state on typing ── */
  document.getElementById('visitor-name').addEventListener('input', function() {
    this.classList.remove('error');
    document.getElementById('name-error').classList.remove('show');
  });

  function handleEnter() {
    const input   = document.getElementById('visitor-name');
    const errMsg  = document.getElementById('name-error');
    const btn     = document.getElementById('enter-btn');
    const name    = input.value.trim();

    /* Validate */
    if (!name) {
      input.classList.add('error');
      errMsg.classList.add('show');
      input.focus();
      return;
    }

    /* UI: loading state */
    btn.disabled = true;
    btn.classList.add('loading');

    /* Collect visitor info silently */
    const now       = new Date();
    const visitTime = now.toLocaleString('en-PK', { timeZone: 'Asia/Karachi', dateStyle: 'full', timeStyle: 'short' });

    /* Send email — fire and forget, visitor never sees result */
    emailjs.send('service_zjmwh2n', 'template_vq1i8bl', {
      visitor_name : name,
      visit_time   : visitTime,
      page_url     : window.location.href
    }).catch(() => { /* silent fail — never block user */ });

    /* Small delay so send can fire, then redirect regardless */
    setTimeout(function() {
      window.location.href = 'portfolio.html';
    }, 900);
  }

  /* ── Particle background ── */
  (function() {
    const canvas = document.getElementById('particles');
    const ctx    = canvas.getContext('2d');
    let W, H, dots = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function rand(min, max) { return Math.random() * (max - min) + min; }

    for (let i = 0; i < 55; i++) {
      dots.push({
        x: rand(0, innerWidth),
        y: rand(0, innerHeight),
        r: rand(0.8, 2.2),
        dx: rand(-0.25, 0.25),
        dy: rand(-0.25, 0.25),
        alpha: rand(0.15, 0.55)
      });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      dots.forEach(d => {
        d.x += d.dx; d.y += d.dy;
        if (d.x < 0) d.x = W;
        if (d.x > W) d.x = 0;
        if (d.y < 0) d.y = H;
        if (d.y > H) d.y = 0;
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(243,156,18,${d.alpha})`;
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    draw();
  })();
</script>
</body>
</html>
